<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoRa Gateway Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-ping {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-value-get {
            background: linear-gradient(135deg, #66e6ea 0%, #4b67a2 100%);
            color: white;
        }
        .btn-value-set {
            background: linear-gradient(135deg, #66e6ea 0%, #4b67a2 100%);
            color: white;
        }
        .btn-ping:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-ping:active {
            transform: translateY(0);
        }
        .btn-discovery {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-discovery:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-discovery:active {
            transform: translateY(0);
        }
        .btn-value-get:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-value-get:active {
            transform: translateY(0);
        }
        .btn-value-set:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-value-set:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status-message {
            margin-top: 30px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .status-message.show {
            display: block;
        }
        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LoRa Gateway Control</h1>
        <p class="subtitle">Send commands to LoRa devices</p>

        <form id="commandForm">
            <div class="form-group">
                <label for="deviceId">Device ID</label>
                <input type="number" id="deviceId" name="deviceId" min="0" max="255" placeholder="Enter device ID (0-255)" required>
            </div>

            <div class="form-group">
                <label for="entityId">Entity ID</label>
                <input type="number" id="entityId" name="entityId" min="0" max="255" placeholder="Set to 255 for all entities">
            </div>

            <div class="form-group">
                <label for="value">Value to set</label>
                <input type="number" id="value" placeholder="Enter value">
            </div>

            <div class="button-group">
                <button type="button" class="btn-ping" id="pingBtn" onclick="sendPing()">📡 Send Ping</button>
                <button type="button" class="btn-discovery" id="discoveryBtn" onclick="sendDiscovery()">🔍 Send Discovery</button>
                <button type="button" class="btn-value-get" id="valueGetBtn" onclick="sendValueGetRequest()">🫴 Get Value</button>
                <button type="button" class="btn-value-set" id="valueSetBtn" onclick="sendValueSetRequest()">✍️ Set Value</button>
            </div>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        const statusMsg = document.getElementById('statusMessage');
        const pingBtn = document.getElementById('pingBtn');
        const discoveryBtn = document.getElementById('discoveryBtn');
        const valueGetBtn = document.getElementById('valueGetBtn');
        const valueSetBtn = document.getElementById('valueSetBtn');
        const deviceIdInput = document.getElementById('deviceId');
        const entityIdInput = document.getElementById('entityId');
        const valueInput = document.getElementById('value');

        function showStatus(message, isSuccess, isLoading = false) {
            statusMsg.textContent = '';
            if (isLoading) {
                const spinner = document.createElement('span');
                spinner.className = 'spinner';
                statusMsg.appendChild(spinner);
                statusMsg.appendChild(document.createTextNode(message));
            } else {
                statusMsg.textContent = message;
            }
            statusMsg.className = 'status-message show ' + (isSuccess ? 'success' : 'error');
        }

        function setButtonsDisabled(disabled) {
            pingBtn.disabled = disabled;
            discoveryBtn.disabled = disabled;
            valueGetBtn.disabled = disabled;
            valueSetBtn.disabled = disabled;
            deviceIdInput.disabled = disabled;
            entityIdInput.disabled = disabled;
        }

        async function sendPing() {
            const deviceId = document.getElementById('deviceId').value;
            if (!deviceId) {
                showStatus('Please enter a device ID', false);
                return;
            }

            setButtonsDisabled(true);
            showStatus('Sending ping request...', true, true);

            try {
                const response = await fetch('/ping', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'deviceId=' + encodeURIComponent(deviceId)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('✓ Ping sent to device ' + deviceId, true);
                } else {
                    showStatus('✗ Failed to send ping: ' + (data.error || 'Unknown error'), false);
                }
            } catch (error) {
                showStatus('✗ Network error: ' + error.message, false);
            } finally {
                setButtonsDisabled(false);
            }
        }

        async function sendDiscovery() {
            const deviceId = document.getElementById('deviceId').value;
            const entityId = document.getElementById('entityId').value;

            if (!deviceId) {
                showStatus('Please enter a device ID', false);
                return;
            }

            if (!entityId) {
                showStatus('Please enter an entity ID', false);
                return;
            }

            setButtonsDisabled(true);
            showStatus('Sending discovery request...', true, true);

            try {
                let body = 'deviceId=' + encodeURIComponent(deviceId);
                    body += '&entityId=' + encodeURIComponent(entityId);

                const response = await fetch('/discovery', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: body
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('✓ Discovery sent to device ' + deviceId, true);
                } else {
                    showStatus('✗ Failed to send discovery: ' + (data.error || 'Unknown error'), false);
                }
            } catch (error) {
                showStatus('✗ Network error: ' + error.message, false);
            } finally {
                setButtonsDisabled(false);
            }
        }

        async function sendValueGetRequest() {
            const deviceId = document.getElementById('deviceId').value;
            const entityId = document.getElementById('entityId').value;

            if (!deviceId) {
                showStatus('Please enter a device ID', false);
                return;
            }

            if (!entityId) {
                showStatus('Please enter an entity ID', false);
                return;
            }

            setButtonsDisabled(true);
            showStatus('Sending value get request...', true, true);

            try {
                let body = 'deviceId=' + encodeURIComponent(deviceId);
                    body += '&entityId=' + encodeURIComponent(entityId);

                const response = await fetch('/value-get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: body
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('✓ Value get request sent to device ' + deviceId, true);
                } else {
                    showStatus('✗ Failed to send value get request: ' + (data.error || 'Unknown error'), false);
                }
            } catch (error) {
                showStatus('✗ Network error: ' + error.message, false);
            } finally {
                setButtonsDisabled(false);
            }
        }

        async function sendValueSetRequest() {
            const deviceId = document.getElementById('deviceId').value;
            const entityId = document.getElementById('entityId').value;
            const value = document.getElementById('value').value;

            if (!deviceId) {
                showStatus('Please enter a device ID', false);
                return;
            }

            if (!entityId) {
                showStatus('Please enter an entity ID', false);
                return;
            }

            if (value === '') {
                showStatus('Please enter a value to set', false);
                return;
            }

            setButtonsDisabled(true);
            showStatus('Sending value set request...', true, true);

            try {
                let body = 'deviceId=' + encodeURIComponent(deviceId);
                body += '&entityId=' + encodeURIComponent(entityId);
                body += '&value=' + encodeURIComponent(value);

                const response = await fetch('/value-set', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: body
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('✓ Value set request sent to device ' + deviceId, true);
                } else {
                    showStatus('✗ Failed to send value set request: ' + (data.error || 'Unknown error'), false);
                }
            } catch (error) {
                showStatus('✗ Network error: ' + error.message, false);
            } finally {
                setButtonsDisabled(false);
            }
        }
</script>
</body>
</html>
